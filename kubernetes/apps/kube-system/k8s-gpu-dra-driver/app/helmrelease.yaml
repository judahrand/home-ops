---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8s-gpu-dra-driver
spec:
  chartRef:
    kind: OCIRepository
    name: k8s-gpu-dra-driver
  interval: 1h
  values:
    kubeletPlugin:
      nodeSelector:
        amd.feature.node.kubernetes.io/gpu: "true"
    cdi:
      staticPath: /run/cdi
      dynamicPath: /run/cdi
