---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app omada-controller
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      omada-controller:
        pod:
          securityContext:
            fsGroup: 508
            fsGroupChangePolicy: "OnRootMismatch"
        containers:
          app:
            image:
              repository: mbentley/omada-controller
              tag: 6.1.0.19@sha256:ae11f51e773d9c17f8578b951ced11253b2ef7cfa9c8d46ef99ecdcd8cc25278
            env:
              TZ: Europe/London
              MANAGE_HTTP_PORT: "8088"
              MANAGE_HTTPS_PORT: "8043"
              PORTAL_HTTP_PORT: "8888"
              PORTAL_HTTPS_PORT: "8843"
              SHOW_SERVER_LOGS: "true"
              SHOW_MONGODB_LOGS: "true"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 500m
                memory: 1200Mi
              limits:
                memory: 2400Mi
    service:
      app:
        controller: omada-controller
        primary: true
        ports:
          http:
            port: &port 8043
            targetPort: *port
            protocol: TCP
            appProtocol: kubernetes.io/ws
      controller:
        controller: omada-controller
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: omada-controller.judahrand.net
          lbipam.cilium.io/ips: "10.0.42.127"
        externalTrafficPolicy: Local
        ports:
          # # Docs: https://www.tp-link.com/us/support/faq/3281/
          # Web Management and Portal
          mgmt-8088-tcp:
            port: 8088
            targetPort: 8088
            protocol: TCP
          mgmt-8043-tcp:
            port: 8043
            protocol: TCP
            targetPort: 8043
          portal-8843-tcp:
            port: 8843
            protocol: TCP
            targetPort: 8843
          # Device Discovery, Adoption, Management, and Upgrade
          eap-v5-discovery:
            port: 29810
            protocol: UDP
            targetPort: 29810
          eap-v4-discovery1:
            port: 29811
            protocol: TCP
            targetPort: 29811
          eap-v4-discovery2:
            port: 29812
            protocol: TCP
            targetPort: 29812
          eap-v4-upgrade:
            port: 29813
            protocol: TCP
            targetPort: 29813
          eap-v5-manage:
            port: 29814
            protocol: TCP
            targetPort: 29814
          eap-v5-device-info:
            port: 29815
            protocol: TCP
            targetPort: 29815
          eap-v5-remote-control:
            port: 29816
            protocol: TCP
            targetPort: 29816
          eap-v6-monitoring:
            port: 29817
            protocol: TCP
            targetPort: 29817
          # Initialization Check
          init-check:
            port: 27001
            protocol: UDP
            targetPort: 27001
          # Database Access
          db-access:
            port: 27217
            protocol: TCP
            targetPort: 27217
    # route:
    #   app:
    #     hostnames:
    #       - "{{ .Release.Name }}.judahrand.net"
    #       - "omada.judahrand.net"
    #     parentRefs:
    #       - name: envoy-internal
    #         namespace: network
    #         sectionName: https
    #     rules:
    #       - backendRefs:
    #           - identifier: app
    #             port: *port
    persistence:
      certificate:
        type: secret
        name: omada-controller-certificate-secret
        globalMounts:
          - path: /cert
      data:
        existingClaim: *app
        globalMounts:
          - path: /opt/tplink/EAPController/data
      work:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /opt/tplink/EAPController/work
      logs:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        globalMounts:
          - path: /opt/tplink/EAPController/logs
      backup:
        type: nfs
        server: truenas.servers
        path: /mnt/main/omada/backup
        globalMounts:
          - path: /opt/tplink/EAPController/data/autobackup
