---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: omada-controller-certificate
spec:
  secretName: omada-controller-certificate-secret
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: omada.judahrand.net
  dnsNames:
    - omada.judahrand.net
    - omada-controller.judahrand.net
