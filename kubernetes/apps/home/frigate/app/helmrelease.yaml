---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/helmrepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: blakeshome
  namespace: &namespace home
spec:
  interval: 1h
  url: https://blakeblackshear.github.io/blakeshome-charts
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
  namespace: &namespace home
spec:
  interval: 30m
  chart:
    spec:
      chart: frigate
      version: 7.8.0
      sourceRef:
        kind: HelmRepository
        name: blakeshome
        namespace: *namespace
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    image:
      repository: ghcr.io/blakeblackshear/frigate
      # Settings for AMD 780M GPU
      tag: 0.17.1-rocm

    env:
      TZ: Europe/London
      # Settings for AMD 780M GPU
      LIBVA_DRIVER_NAME: radeonsi

    envFromSecrets:
      - frigate-secret

    resources:
      claims:
        # Settings for AMD 780M GPU
        - name: gpu
      requests:
        cpu: 500m
        memory: 6Gi
      limits:
        memory: 8Gi

    securityContext:
      capabilities:
        add:
          - PERFMON
          - NET_ADMIN
          - NET_RAW
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
      seccompProfile: { type: RuntimeDefault }

    persistence:
      config:
        enabled: true
        existingClaim: frigate
      media:
        enabled: true
        existingClaim: frigate-media

    config: |
      mqtt:
        host: mosquitto.home.svc.cluster.local

      ffmpeg:
        hwaccel_args: preset-vaapi
        output_args:
          record: preset-record-generic-audio-copy

      tls:
        enabled: false

      notifications:
        enabled: true
        email: judahrand+frigate@gmail.com

      model:
        path: plus://6a7dddafe77cf3df7b3f03b1afe4b219

      detectors:
        onnx_0:
          type: onnx
          device: GPU

      logger:
        default: info

      semantic_search:
        enabled: true
        model_size: small

      face_recognition:
        enabled: true
        model_size: small

      lpr:
        enabled: true
        debug_save_plates: true
        format: "^[A-Z]{2}[0-9]{2} [A-Z]{3}$"
        replace_rules:
          # 1. Basic cleaning: Remove common noise symbols Frigate might pick up
          - pattern: "[%#*?._-]"
            replacement: ""

          # 2. Remove any whitespace to standardize the input before applying other rules
          - pattern: "[ ]+"
            replacement: ""

          # 3. Fix Number-to-Letter confusion (Positions 1, 2, 5, 6, 7 should be Letters)
          # Fixes '0' or 'Q' to 'O' in the first two letters and last three letters
          - pattern: '^([0Q])'
            replacement: 'O'
          - pattern: '^([A-Z][0Q])'
            replacement: '\1O'
          - pattern: '([0Q])[A-Z]{2}$'
            replacement: 'O'
          - pattern: '([0Q])[A-Z]$'
            replacement: 'O'
          - pattern: '([0Q])$'
            replacement: 'O'

          # 4. Fix B vs 8 confusion (Positions 1, 2, 5, 6, 7 should be Letters)
          # Fixes '8' to 'B' in the first two letters and last three letters
          - pattern: '^8'
            replacement: 'B'
          - pattern: '^([A-Z])8'
            replacement: '\1B'
          - pattern: '8[A-Z]{2}$'
            replacement: 'B'
          - pattern: '8[A-Z]$'
            replacement: 'B'
          - pattern: '8$'
            replacement: 'B'

          # 5. Fix Letter-to-Number confusion (Positions 3 and 4 should be Numbers)
          # Fixes 'O'/'I' to '0'/'1' in the middle age-identifier digits
          - pattern: '^([A-Z]{2})O'
            replacement: '\10'
          - pattern: '^([A-Z]{2}[0-9])O'
            replacement: '\10'
          - pattern: '^([A-Z]{2})I'
            replacement: '\11'
          - pattern: '^([A-Z]{2}[0-9])I'
            replacement: '\11'
          - pattern: '^([A-Z]{2})B'
            replacement: '\18'
          - pattern: '^([A-Z]{2}[0-9])B'
            replacement: '\18'

          # 6. Standardization: Ensure there is exactly one space for readability
          # This takes any 7-character string and inserts a space: BD51SMR -> BD51 SMR
          - pattern: '^([A-Z]{2}[0-9]{2})([A-Z]{3})$'
            replacement: '\1 \2'

      classification:
        bird:
          enabled: false

      review:
        alerts:
          enabled: true
          labels:
            - amazon
            - car
            - dhl
            - dpd
            - fedex
            - motorcycle
            - person
            - royal_mail
            - ups
        detections:
          enabled: true

      motion:
        enabled: true

      detect:
        enabled: true

      record:
        enabled: true
        sync_recordings: true
        continuous:
          days: 0
        motion:
          days: 0
        alerts:
          pre_capture: 5
          post_capture: 5
          retain:
            days: 30
        detections:
          pre_capture: 5
          post_capture: 5
          retain:
            days: 30

      snapshots:
        enabled: true
        retain:
          default: 30

      objects:
        track:
          - amazon
          - bicycle
          - bird
          - car
          - cat
          - dog
          - dhl
          - dpd
          - face
          - fedex
          - fox
          - license_plate
          - motorcycle
          - package
          - person
          - royal_mail
          - ups
          - waste_bin

      audio:
        enabled: true
        listen:
          - bark
          - car_alarm
          - fire_alarm
          - glass
          - honk
          - scream
          - speech
          - yell

      audio_transcription:
        enabled: true

      go2rtc:
        streams:
          doorbell_cam:
            - ffmpeg:http://front.iot/flv?port=1935&app=bcs&stream=channel0_main.bcs&user={FRIGATE_REOLINK_USER}&password={FRIGATE_REOLINK_PASSWORD}#video=copy#audio=copy#audio=opus
            - rtsp://{FRIGATE_REOLINK_USER}:{FRIGATE_REOLINK_PASSWORD}@front.iot/Preview_01_sub
          doorbell_cam_sub:
            - ffmpeg:http://front.iot/flv?port=1935&app=bcs&stream=channel0_ext.bcs&user={FRIGATE_REOLINK_USER}&password={FRIGATE_REOLINK_PASSWORD}
            - rtsp://{FRIGATE_REOLINK_USER}:{FRIGATE_REOLINK_PASSWORD}@front.iot/Preview_01_sub
          alleyway_cam:
            - rtsp://{FRIGATE_REOLINK_USER}:{FRIGATE_REOLINK_PASSWORD}@alleyway.iot/Preview_01_main
          alleyway_cam_sub:
            - ffmpeg:http://alleyway.iot/flv?port=1935&app=bcs&stream=channel0_ext.bcs&user={FRIGATE_REOLINK_USER}&password={FRIGATE_REOLINK_PASSWORD}
            - rtsp://{FRIGATE_REOLINK_USER}:{FRIGATE_REOLINK_PASSWORD}@alleyway.iot/Preview_01_sub
          webrtc:
            candidates:
              - homeassistant.local:8555
              - stun:8555

      birdseye:
        enabled: true
        mode: continuous
        restream: true

      cameras:
        doorbell_cam:
          webui_url: http://front.iot
          audio:
            enabled: true
          ffmpeg:
            inputs:
              - path: rtsp://127.0.0.1:8554/doorbell_cam
                input_args: preset-rtsp-restream
                roles:
                  - record
              - path: rtsp://127.0.0.1:8554/doorbell_cam_sub
                input_args: preset-rtsp-restream
                roles:
                  - audio
                  - detect
          detect:
            width: 640
            height: 480
            fps: 7
          zones:
            driveway:
              coordinates:
                0.305,0.602,0.658,0.646,0.704,0.997,0.006,0.997,0.005,0.879,0.121,0.84,0.087,0.687
              loitering_time: 0
              friendly_name: Driveway
            driveway_entrance:
              coordinates: 0.651,0.604,0.647,0.637,0.26,0.588,0.283,0.572
              loitering_time: 10
              friendly_name: Driveway Entrance
            driveway_street:
              coordinates: 0.292,0.565,0.355,0.549,0.637,0.56,0.654,0.596
              loitering_time: 30
              objects:
                - car
                - motorcycle
                - person
              friendly_name: Driveway Street
          motion:
            mask: 0.698,0,0.698,0.06,0.29,0.06,0.287,0
            contour_area: 30
          review:
            alerts:
              required_zones:
                - driveway
                - driveway_entrance
                - driveway_street
            detections:
              required_zones: driveway
        alleyway_cam:
          webui_url: http://alleyway.iot
          audio:
            enabled: true
          ffmpeg:
            inputs:
              - path: rtsp://127.0.0.1:8554/alleyway_cam
                input_args: preset-rtsp-restream
                roles:
                  - record
              - path: rtsp://127.0.0.1:8554/alleyway_cam_sub
                input_args: preset-rtsp-restream
                roles:
                  - audio
                  - detect
          detect:
            width: 640
            height: 360
            fps: 7
          motion:
            mask: 0.291,0.016,0.293,0.073,0.711,0.078,0.709,0.015
            contour_area: 30
          zones:
            alleyway:
              coordinates: 0.53,0.238,0.858,0.237,0.797,0.997,0.004,0.995,0.004,0.744
              loitering_time: 0
              friendly_name: Alleyway
            alleyway_entrance:
              coordinates: 0.54,0.224,0.856,0.217,0.85,0.18,0.54,0.172
              loitering_time: 5
              friendly_name: Alleyway Entrance
            alleyway_street:
              coordinates: 0.545,0.148,0.848,0.157,0.831,0.104,0.547,0.074
              loitering_time: 30
              objects:
                - car
                - motorcycle
                - person
              friendly_name: Alleyway Street
          review:
            alerts:
              required_zones:
                - alleyway
                - alleyway_entrance
                - alleyway_street
            detections:
              required_zones: alleyway

      camera_groups:
        Driveway:
          order: 1
          icon: LuCar
          cameras: doorbell_cam
        Alleyway:
          order: 2
          icon: LuHouse
          cameras: alleyway_cam
        Birdseye:
          order: 3
          icon: LuBird
          cameras: birdseye

      telemetry:
        stats:
          network_bandwidth: true

  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              - op: add
                path: /spec/template/spec/resourceClaims
                value:
                  - name: gpu
                    resourceClaimTemplateName: frigate
            target:
              group: apps
              version: v1
              kind: Deployment
              name: frigate
