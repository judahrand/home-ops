---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-database
spec:
  instances: 3
  # renovate: datasource=docker depName=ghcr.io/tensorchord/cloudnative-pgvecto.rs
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17.5-0.3.0@sha256:2b397c7080ae712d407e925cc087ad7061dee7fbeb7ec6f55c6bc8482ef6b4f2
  primaryUpdateStrategy: unsupervised
  enablePDB: true

  storage:
    size: 10Gi  # this is not enforced because we're using a hostpath storage class
    storageClass: openebs-hostpath

  superuserSecret:
    name: cloudnative-pg-secret

  enableSuperuserAccess: true

  postgresql:
    shared_preload_libraries:
      - "vchord.so"
    parameters:
      max_connections: "100"
      shared_buffers: 256MB

  managed:
    roles:
      - name: immich
        ensure: present
        login: true
        superuser: false
        inRoles: []
        passwordSecret:
          name: immich-database-secret

  resources:
    requests:
      cpu: 20m
      memory: 512Mi
    limits:
      memory: 4Gi

  monitoring:
    enablePodMonitor: true

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: immich-database
        # Note: serverName version needs to be incremented
        # when recovering from an existing cnpg cluster
        serverName: &currentCluster immich-database-v4

  bootstrap:
    # initdb:
    #   database: immich
    #   owner: immich
    #   secret:
    #     name: immich-database-secret
    #   dataChecksums: true
    #   postInitApplicationSQL:
    #     # Commands based on: https://immich.app/docs/administration/postgres-standalone/#without-superuser-permission
    #     - ALTER DATABASE immich OWNER TO immich;
    #     - CREATE EXTENSION vchord CASCADE;
    #     - CREATE EXTENSION earthdistance CASCADE;
  # Note: previousCluster needs to be set to the name of the previous
  # cluster when recovering from an existing cnpg cluster
    recovery:
      source: &previousCluster immich-database-v3
  #
  # # Note: externalClusters is needed when recovering from an existing cnpg cluster
  externalClusters:
    - name: *previousCluster
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: nas-backup
          serverName: *previousCluster
