apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: nas-backup
spec:
  retentionPolicy: 30d
  configuration:
    destinationPath: s3://cloudnative-pg/
    endpointURL: http://truenas.servers:9000
    s3Credentials:
      accessKeyId:
        name: cloudnative-pg-secret
        key: aws-access-key-id
      secretAccessKey:
        name: cloudnative-pg-secret
        key: aws-secret-access-key
    data:
      compression: bzip2
    wal:
      compression: bzip2
      maxParallel: 8
